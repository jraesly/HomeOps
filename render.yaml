# Render blueprint: deploy the HomeOps API + managed Postgres.
# Push to GitHub, then in Render: New > Blueprint, point it at this repo.
services:
  - type: web
    name: homeops-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: homeops-db
          property: connectionString
      - key: ENVIRONMENT
        value: production

databases:
  - name: homeops-db
    plan: free
